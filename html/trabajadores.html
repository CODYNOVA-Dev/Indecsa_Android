<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INDECSA – Administrador</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --navy: #0B1F3A;
      --navy-mid: #152D50;
      --navy-dark: #0a1828;
      --gold: #C8A96E;
      --gold-light: #E0C890;
      --white: #F8F9FC;
      --muted: #8A9BB5;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--navy); min-height: 100vh; display: flex; flex-direction: column; }

    /* HEADER */
    header {
      background: var(--navy-mid); border-bottom: 1px solid rgba(200,169,110,0.25);
      padding: 0 2rem; height: 72px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo-box {
      width: 180px; height: 48px;
      border: 1.5px dashed rgba(200,169,110,0.5); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase;
    }
    .header-tag { font-size: 11px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }

    /* NAVBAR */
    nav {
      background: var(--navy-dark); border-bottom: 1px solid rgba(200,169,110,0.15);
      display: flex; align-items: center; padding: 0 2rem; height: 48px; gap: 4px;
    }
    .nav-link {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 16px; border-radius: 6px;
      font-size: 13px; color: var(--muted); text-decoration: none;
      transition: background 0.2s, color 0.2s;
    }
    .nav-link:hover, .nav-link.active { background: rgba(200,169,110,0.1); color: var(--gold); }
    .nav-link i { font-size: 13px; }
    .nav-sep { flex: 1; }
    .nav-logout {
      display: flex; align-items: center; gap: 7px;
      padding: 6px 16px; border-radius: 6px;
      font-size: 13px; color: #F09595; cursor: pointer;
      border: 1px solid rgba(226,75,74,0.25);
      background: none; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s;
    }
    .nav-logout:hover { background: rgba(226,75,74,0.1); }
    .nav-logout i { font-size: 13px; }

    /* MAIN */
    main {
      flex: 1; padding: 2.5rem 2rem;
      background: radial-gradient(ellipse at 60% 40%, #1a2e4a 0%, var(--navy) 65%);
      display: flex; flex-direction: column; align-items: center;
    }

    .top { text-align: center; margin-bottom: 2rem; }
    .top h2 { font-family: 'Playfair Display', serif; color: var(--white); font-size: 26px; margin-bottom: 6px; }
    .top p { color: var(--muted); font-size: 13px; }

    /* ESTADÍSTICAS */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 12px; width: 100%; max-width: 860px; margin-bottom: 2rem;
    }
    .stat {
      background: var(--navy-mid); border: 1px solid rgba(200,169,110,0.15);
      border-radius: 12px; padding: 18px; text-align: center;
    }
    .stat-num { font-size: 28px; font-weight: 500; color: var(--gold); }
    .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* TARJETAS */
    .cards-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 14px; width: 100%; max-width: 860px;
    }
    /* Contenedor principal de la tarjeta */
    .mod-card {
      display: flex; /* Alinea los hijos en línea */
      align-items: flex-start; /* Alinea el icono con el inicio del texto */
      gap: 20px; /* Espacio entre el icono y el texto */
      padding: 25px;
      background-color: #1a2b48; /* El color azul oscuro de tu imagen */
      border: 1px solid #334466;
      border-radius: 15px;
      text-decoration: none;
      color: white;
      transition: transform 0.2s;
    }

    /* Tamaño del contenedor del icono */
    .mod-icon {
      flex-shrink: 0; /* Evita que el icono se aplaste */
      width: 60px;
      height: 60px;
    }

    /* Ajustes del cuerpo de la tarjeta */
    .card-body {
      display: flex;
      flex-direction: column;
      text-align: left; /* Asegura que el texto se alinee a la izquierda */
    }

    .card-body h3 {
      margin: 0 0 10px 0;
      font-size: 1.25rem;
    }

    .card-body p {
      margin: 0;
      font-size: 0.9rem;
      color: #a0aec0; /* Un gris claro para el texto descriptivo */
      line-height: 1.5;
    }

    /* La línea decorativa opcional */
    .divider {
      margin-top: 15px;
      height: 1px;
      background-color: rgba(255, 255, 255, 0.1);
      width: 100%;
    }

    .crud-list { width: 100%; display: flex; flex-direction: column; gap: 7px; }
    .crud-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 12px; border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 12px;
    }
    .crud-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .crud-item span { color: var(--muted); }
    .dot-green { background: #5DCAA5; }
    .dot-blue  { background: #85B7EB; }
    .dot-amber { background: #FAC775; }
    .dot-red   { background: #F09595; }
    /* FOOTER */
    footer {
      background: var(--navy-mid); border-top: 1px solid rgba(200,169,110,0.15);
      height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 2rem;
    }
    .footer-left { font-size: 12px; color: var(--muted); }
    .footer-contact { display: flex; gap: 24px; }
    .footer-contact a { font-size: 12px; color: var(--muted); text-decoration: none; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .footer-contact a:hover { color: var(--gold); }
    .footer-contact a i { font-size: 13px; color: var(--gold);

    }
  </style>
</head>
<body>

<header>
  <img src="../../img/logo.png" height="52" alt="INDECSA" />
  <div class="header-tag">Gestión de proyectos &amp; contratistas</div>
</header>

<nav>
  <a class="nav-link active" href="dashboard.html">
    <i class="fa-solid fa-user"></i> Trabajadores
  </a>
  <a class="nav-link" href="contratistas.html">
    <i class="fa-solid fa-people-group"></i> Contratistas
  </a>
  <a class="nav-link" href="proyectos.html">
    <i class="fa-solid fa-diagram-project"></i> Proyectos
  </a>
  <div class="nav-sep"></div>
  <button class="nav-logout" onclick="cerrarSesion()">
    <i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión
  </button>
</nav>

<main>
  <div class="top">
    <h2>Trabajadores</h2>
    <p>Seleccione una accion para comenzar</p>
  </div>
  <div class="cards-grid">
    <a class="mod-card">
      <div class="mod-icon">
        <svg viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="12" r="6" stroke="#C8A96E" stroke-width="2"/>
          <path d="M6 30c0-6.627 5.373-12 12-12s12 5.373 12 12" stroke="#C8A96E" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>

      <div class="card-body">
        <h3>Trabajadores</h3>
        <p>Gestiona el personal registrado: altas, consultas, modificaciones y bajas de empleados dentro del sistema.</p>
        <div class="divider"></div>
      </div>
    </a>
  </div>
</main>
</body>
</html>
